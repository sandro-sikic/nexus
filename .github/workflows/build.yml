name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'web/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all platforms
        run: make build-all

      - name: Create zip archive
        run: zip -j dist/nexus_all.zip dist/nexus_*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (${{ github.sha }})
          body: |
            Automated build from commit ${{ github.sha }}

            **Changes:** ${{ github.event.head_commit.message }}
          files: |
            dist/nexus_linux_amd64
            dist/nexus_linux_arm64
            dist/nexus_darwin_amd64
            dist/nexus_darwin_arm64
            dist/nexus_windows_amd64.exe
            dist/nexus_all.zip
          make_latest: true
