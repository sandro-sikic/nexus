# nexus.yaml — example configuration
#
# Tasks execute with stream output inside the TUI by default.
# To hand off the terminal to a command (e.g., for interactive programs),
# set handoff: true at the task level.
#
# Actions: use the "actions" field to define a list of commands to execute.
# Each action can have:
#   - command: the shell command to run (required)
#   - background: true/false - whether to run in background (optional)
#
# Task fields:
#   - name: task name (required)
#   - description: task description (optional)
#   - actions: list of commands to execute (required)
#   - dir: working directory (optional)
#   - group: group label for display (optional)
#   - handoff: true/false - hand off terminal to the last action (optional)
#
# Rules:
#   - Actions execute sequentially
#   - When handoff: true, the LAST action is handed off to the terminal
#   - An action cannot have both background: true and be the handoff action
#   - Background actions continue running while foreground actions execute
#
# group: optional label — tasks with the same group are shown together.

title: "My Project Nexus"

tasks:
  # ── Development ──────────────────────────────────────────
  - name: Dev Server
    description: Start the development server with hot reload
    actions:
      - command: "npm run dev"
    handoff: true  # hand off terminal; Ctrl+C works normally
    group: Development

  - name: Setup and Dev
    description: Install deps then start the dev server
    actions:
      - command: "npm install"
      - command: "npm run dev"
    handoff: true
    group: Development

  - name: Watch Tests
    description: Run tests in watch mode
    actions:
      - command: "npm run test:watch"
    handoff: true
    group: Development

  - name: Type Check
    description: Run TypeScript type checker
    actions:
      - command: "npm run typecheck"
    group: Development

  # ── Build ────────────────────────────────────────────────
  - name: Build
    description: Production build
    actions:
      - command: "npm run build"
    group: Build

  - name: Preview
    description: Preview the production build locally
    actions:
      - command: "npm run preview"
    handoff: true
    group: Build

  # ── Quality ──────────────────────────────────────────────
  - name: Lint
    description: Run ESLint across the project
    actions:
      - command: "npm run lint"
    group: Quality

  - name: Format
    description: Format code with Prettier
    actions:
      - command: "npm run format"
    group: Quality

  # ── Utilities ────────────────────────────────────────────
  - name: Install Deps
    description: Install / update npm dependencies
    actions:
      - command: "npm install"
    group: Utilities

  - name: Clean
    description: Remove build artifacts and node_modules
    actions:
      - command: "rm -rf dist node_modules"
    group: Utilities

  # ── Mixed Foreground/Background ──────────────────────────
  # Use background: true to run commands in the background.
  # Background actions continue while foreground actions execute.

  - name: Dev Server + Playwright
    description: Start dev server in background, then run playwright codegen
    actions:
      - command: "npm run dev"
        background: true
      - command: "npx playwright codegen"
    handoff: true
    group: Development

  # ── Background Process Demo ──────────────────────────────
  - name: Background Logger
    description: Demo background process (pings localhost)
    actions:
      - command: "ping -n 10 127.0.0.1"
        background: true
    group: Utilities
